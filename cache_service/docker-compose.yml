services:
  response-generator:
    build: ../Consultas
    container_name: response-generator
    ports:
      - "8001:8001"

  cache-service:
    build: .
    container_name: cache-service
    ports:
      - "8000:8000"
    depends_on:
      - response-generator

  traffic-generator:
    build: ../Generador_Trafico
    container_name: traffic-generator
    depends_on:
      - cache-service